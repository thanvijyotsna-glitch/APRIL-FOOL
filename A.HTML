<!DOCTYPE html>
<html>
<head>
<title>Birthday Game 🎮</title>

<!-- ✍️ Handwriting Font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
    background:black;
    color:#00ffcc;
    text-align:center;
    font-family:Courier New;
}

/* Game Area */
#gameArea{
    margin-top:100px;
}

button{
    padding:20px 40px;
    font-size:20px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#00ffaa;
}

/* Popup */
#popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:#00ffcc;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* ✍️ Message Styling */
#msg{
    font-family: 'Pacifico', cursive;
    font-size: 22px;
    color: #ffccff;
    text-shadow: 0 0 10px #ff99ff;
    margin-top:20px;
}

/* 🎊 Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:0;
    animation: fall linear forwards;
}

@keyframes fall{
    from{transform:translateY(-10px);}
    to{transform:translateY(100vh);}
}
</style>

</head>

<body>

<h1>🎮 BIRTHDAY GAME 💚</h1>
<p>Click the button to unlock surprise 😎</p>

<div id="gameArea">
<button onclick="addScore()">CLICK ME 🐒</button>
<h2 id="score">Score: 0</h2>
</div>

<!-- 🎉 POPUP -->
<div id="popup">
<h1>🎉 HAPPY BIRTHDAY AKKUUU 💚</h1>

<h2>🐒 Bandar Mode Activated 🐒</h2>

<p id="msg"></p>
</div>

<script>

let score = 0;

// 🎮 GAME
function addScore(){
    score++;
    document.getElementById("score").innerHTML = "Score: " + score;

    if(score === 26){
        showPopup();
    }
}

// 🎉 SHOW POPUP
function showPopup(){
    document.getElementById("popup").style.display="flex";
    launchConfetti();
    typeMessage();
}

// 🎊 CONFETTI
function launchConfetti(){
    for(let i=0;i<120;i++){
        let c = document.createElement("div");
        c.className="confetti";

        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration=(Math.random()*2+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{c.remove();},3000);
    }
}

// 💌 MESSAGE
const message = [
"BIRTHDAYYYYYYYY MONTH!!!!!!!! 💗💗 bandar bhaiiiii 🐒",
"A legend and fool (*my fool) born in this month 😎",
"It's your birthdayyy month but mine too a festival 😉🎀",
"Babajii bless youuu with happiness you deserve ✨",
"Be happy and healthy always 😌",
"From your annoying gurl 🎀💗"
];

let i=0,j=0;

function typeMessage(){
    if(i<message.length){
        if(j<message[i].length){
            document.getElementById("msg").innerHTML += message[i][j];
            j++;
            setTimeout(typeMessage,40);
        } else {
            document.getElementById("msg").innerHTML += "<br>";
            i++;
            j=0;
            setTimeout(typeMessage,500);
        }
    }
}

</script>

</body>
</html>
